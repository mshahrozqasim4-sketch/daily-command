<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0A0A0A" rx="48"/>

  <!-- Outer border -->
  <rect x="16" y="16" width="480" height="480" fill="none" stroke="#1a1a1a" stroke-width="1" rx="36"/>

  <!-- Corner brackets -->
  <!-- Top left -->
  <path d="M40 80 L40 40 L80 40" fill="none" stroke="#00ff41" stroke-width="2" stroke-linecap="square" filter="url(#glow)"/>
  <!-- Top right -->
  <path d="M432 40 L472 40 L472 80" fill="none" stroke="#00ff41" stroke-width="2" stroke-linecap="square" filter="url(#glow)"/>
  <!-- Bottom left -->
  <path d="M40 432 L40 472 L80 472" fill="none" stroke="#00ff41" stroke-width="2" stroke-linecap="square" filter="url(#glow)"/>
  <!-- Bottom right -->
  <path d="M432 472 L472 472 L472 432" fill="none" stroke="#00ff41" stroke-width="2" stroke-linecap="square" filter="url(#glow)"/>

  <!-- Central rocket / launch symbol -->
  <!-- Rocket body -->
  <path d="M256 120 C256 120 216 160 216 220 L216 290 L256 310 L296 290 L296 220 C296 160 256 120 256 120Z" fill="none" stroke="#00ff41" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Rocket nose -->
  <path d="M256 120 L256 148" fill="none" stroke="#00ff41" stroke-width="2" filter="url(#glow)"/>

  <!-- Window -->
  <circle cx="256" cy="210" r="16" fill="none" stroke="#00ff41" stroke-width="2" filter="url(#glow)"/>
  <circle cx="256" cy="210" r="6" fill="#00ff41" filter="url(#softglow)"/>

  <!-- Fins left -->
  <path d="M216 270 L188 300 L216 290Z" fill="none" stroke="#00ff41" stroke-width="2" filter="url(#glow)"/>
  <!-- Fins right -->
  <path d="M296 270 L324 300 L296 290Z" fill="none" stroke="#00ff41" stroke-width="2" filter="url(#glow)"/>

  <!-- Exhaust flames -->
  <path d="M236 310 Q246 340 256 330 Q266 340 276 310" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <path d="M244 318 Q252 355 256 345 Q260 355 268 318" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.3" filter="url(#glow)"/>

  <!-- Orbit ring -->
  <ellipse cx="256" cy="240" rx="80" ry="24" fill="none" stroke="#00ff41" stroke-width="1" stroke-dasharray="4 6" opacity="0.4"/>

  <!-- Small orbit dot -->
  <circle cx="336" cy="240" r="4" fill="#00ff41" opacity="0.7" filter="url(#glow)"/>

  <!-- Ground line -->
  <line x1="80" y1="370" x2="432" y2="370" stroke="#1e1e1e" stroke-width="1"/>

  <!-- App name -->
  <text x="256" y="410" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="32" font-weight="700" fill="#00ff41" text-anchor="middle" letter-spacing="-1" filter="url(#glow)">LAUNCHPAD</text>
  <text x="256" y="445" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" font-weight="400" fill="#00ff41" text-anchor="middle" letter-spacing="8" opacity="0.6">OS</text>

  <!-- Status dot top right -->
  <circle cx="460" cy="52" r="5" fill="#00ff41" filter="url(#softglow)"/>

  <!-- Scan lines overlay (subtle) -->
  <rect x="16" y="16" width="480" height="480" fill="url(#scanlines)" rx="36" opacity="0.03"/>
</svg>
